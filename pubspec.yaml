name: kharcha_pani
description: "Personal expense and finance management — local SQLite, no backend."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  intl: ^0.20.2
  path: ^1.9.1
  sqflite: ^2.4.2
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/app_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/app_logo.png
  min_sdk_android: 21
